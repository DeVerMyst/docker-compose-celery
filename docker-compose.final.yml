services:
  # --- LE MOTEUR (BROKER) ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_server
    ports:
      - "5672:5672"   # Port de com Celery
      - "15672:15672" # Interface Web (guest/guest)
    networks:
      - ml-network

  # --- LE STOCKAGE (BACKEND) ---
  redis:
    image: redis:alpine
    container_name: redis_server
    # On n'a pas forcément besoin d'exposer le port 6379 sur l'hôte, 
    # mais c'est pratique pour débugger avec un outil externe.
    ports:
      - "6379:6379"
    networks:
      - ml-network

  # --- L'API (PRODUCTEUR) ---
  api:
    build: .
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis
    networks:
      - ml-network

  # --- LE WORKER (CONSOMMATEUR) ---
  worker:
    build: .
    # container_name: celery_worker
    command: celery -A worker.app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MODEL_LATENCY=5
    depends_on:
      - rabbitmq
      - redis
    networks:
      - ml-network

  # --- LE FRONT (UI) ---
  front:
    build: .
    container_name: streamlit_app
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - ml-network

  # --- MONITORING ---
  flower:
    image: mher/flower:latest
    container_name: flower_monitor
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge